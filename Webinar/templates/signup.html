{% extends 'home.html' %}

{% block extra_css %}
{% load static %}
    <link rel="stylesheet" href="{% static 'css/base.css' %}">
    <link rel="stylesheet" href="{% static 'css/slider.css' %}">
<link rel="stylesheet" href="{% static 'css/signupandlogin.css' %}">
{% endblock %}
{% block content %}


<main>
    <div class="card">
        {% if error %}
        <p style="color: var(--accent);">{{ error }}</p>
        {% endif %}
        <h1>Signup</h1>
        <form method="post">
            {% csrf_token %}
            <input type="text" name="first_name" id="first_name" placeholder="First Name" required />
            <input type="text" name="last_name" id="last_name" placeholder="Last Name" required />
            <input type="text" name="username" id="username" placeholder="Username" required />
            <select name="gender" required>
                <option value="">Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
            <input type="number" name="age" id="age" placeholder="Age" min="1" required />
            <input type="email" name="email" id="email" placeholder="Email" required />
            <input type="password" name="password" id="password" placeholder="Password" required />
            <input type="password" name="password_confirm" id="password_confirm" placeholder="Confirm Password" required />
            <button>Create Account</button>
        </form>
    </div>
</main>
{% endblock %}
