<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Webinar</title>

    {% load static %}

    <link rel="stylesheet" href="{% static 'css/add_webinar.css' %}">
</head>

<body>
<div class="container">
    <h1>Create Webinar</h1>

    <form action="" method="POST" id="webinarForm">
        {% csrf_token %}
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" id="name" name="name" required>
        </div>

        <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" name="description" required></textarea>
        </div>

        <div class="form-group">
            <label for="link">Webinar Link</label>
            <input type="url" id="link" name="link" required>
        </div>

        <div class="row">
            <div class="form-group">
                <label for="host_date">Host Date</label>
                <input type="datetime-local" id="host_at" name="hosted_at" required>
            </div>

            <div class="form-group">
                <label for="ticket_expiration">Ticket Expiration</label>
                <input type="datetime-local" id="ticket_expiration" name="ticket_expiration" required>
            </div>
        </div>

        <div class="row">
            <div class="form-group">
                <label for="stock">Ticket Amount</label>
                <input type="number" id="stock" name="stock" min="1" required>
            </div>

            <div class="form-group">
                <label for="price">Price ($)</label>
                <input type="number" id="price" name="price" min="0" step="0.01" required>
            </div>
        </div>

        <div class="form-group">
            <label for="image">Webinar Image</label>
            <input type="file" id="image" name="image" accept="image/*" required>
        </div>
        <div class="form-group">
            <label for="other_hosts">Other Hosts</label>
            <select id="other_hosts" name="other_hosts" multiple>
                {% for user in users %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                {% empty %}
                    <option>No users found</option>
                {% endfor %}
            </select>
        </div>

        <button type="submit">Create Webinar</button>
    </form>

    <div class="preview" id="previewCard">
        <h2 id="previewTitle"></h2>
        <img id="previewImage" src="" alt="Preview">
        <p id="previewDescription"></p>
        <p><strong>Date:</strong> <span id="previewDate"></span></p>
        <p><strong>Price:</strong> $<span id="previewPrice"></span></p>
        <p><strong>Tickets:</strong> <span id="previewTickets"></span></p>
    </div>
</div>

<script>
const form = document.getElementById('webinarForm');
const previewCard = document.getElementById('previewCard');

form.addEventListener('submit', function(e) {
    {#e.preventDefault();#}

    const title = document.getElementById('title').value;
    const description = document.getElementById('description').value;
    const hostDate = document.getElementById('host_date').value;
    const price = document.getElementById('price').value;
    const tickets = document.getElementById('stock').value;
    const imageInput = document.getElementById('image');

    if (!imageInput.files.length) return;

    const reader = new FileReader();

    reader.onload = function(event) {
        document.getElementById('previewTitle').textContent = title;
        document.getElementById('previewDescription').textContent = description;
        document.getElementById('previewDate').textContent = hostDate;
        document.getElementById('previewPrice').textContent = price;
        document.getElementById('previewTickets').textContent = tickets;
        document.getElementById('previewImage').src = event.target.result;

        previewCard.style.display = 'block';
        previewCard.scrollIntoView({ behavior: 'smooth' });
    }

    reader.readAsDataURL(imageInput.files[0]);

});
</script>

</body>
</html>
